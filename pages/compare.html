<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المقارنة | نُخبة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#030608;color:#fff;font-family:Tajawal,sans-serif}
a{text-decoration:none;color:inherit}
.page{width:min(1200px,94%);margin:auto;padding:35px 0 70px}
.top{background:#05090c;border-bottom:1px solid #ffffff18;padding:16px 0}
.nav{width:min(1200px,94%);margin:auto;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:34px;font-weight:900}.logo span{color:#d8a64b}
.btn{border:0;cursor:pointer;color:#111;font-weight:900;border-radius:12px;padding:13px 22px;background:linear-gradient(135deg,#f3d18a,#ad762d);display:inline-block}
.btn.secondary{background:#ffffff12;color:#fff;border:1px solid #ffffff25}
h1{font-size:38px;margin:0 0 24px}
.compare{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.card{background:linear-gradient(180deg,#151b20,#080b0e);border:1px solid #ffffff20;border-radius:24px;padding:16px;box-shadow:0 24px 70px #0008}
.card img{width:100%;height:180px;object-fit:contain;border-radius:16px;background:#0b1014;padding:14px}
.card h3{font-size:18px}
.row{border-top:1px solid #ffffff12;padding:10px 0;color:#ddd}
.row b{color:#f3d18a}
.empty{text-align:center;background:#111820;border:1px solid #ffffff18;border-radius:24px;padding:45px;color:#aaa}
@media(max-width:900px){.compare{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.compare{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="top">
  <div class="nav">
    <div class="logo">نُخ<span>بة</span></div>
    <a class="btn" href="../index.html">الرئيسية</a>
  </div>
</header>

<main class="page">
<h1>مقارنة المنتجات</h1>
<section class="compare" id="compareBox"></section>
</main>

<script src="../js/nukhba-data.js"></script>
<script>
let compare = JSON.parse(localStorage.getItem("nukhba_compare")) || [];
const box = document.getElementById("compareBox");

function render(){
  if(!compare.length){
    box.innerHTML = `<div class="empty"><h2>لا توجد منتجات للمقارنة</h2><p>أضف منتجات للمقارنة من الصفحة الرئيسية.</p><br><a class="btn" href="../index.html">العودة للمتجر</a></div>`;
    return;
  }

  box.innerHTML = compare.map(id=>{
    const p = getProductById(id);
    if(!p) return "";
    return `
      <div class="card">
        <img src="${p.image}" alt="${p.name}">
        <h3>${p.name}</h3>
        <div class="row"><b>السعر:</b> ${formatPrice(p.price)}</div>
        <div class="row"><b>الحالة:</b> ${p.condition}</div>
        <div class="row"><b>الضمان:</b> ${p.warranty}</div>
        <div class="row"><b>المدينة:</b> ${p.city}</div>
        <div class="row"><b>التقييم:</b> ★ ${p.rating}</div>
        <button class="btn secondary" onclick="removeCompare(${p.id})">حذف</button>
      </div>
    `;
  }).join("");
}

function removeCompare(id){
  compare = compare.filter(x=>Number(x)!==Number(id));
  localStorage.setItem("nukhba_compare",JSON.stringify(compare));
  render();
}

render();
</script>

</body>
</html>
