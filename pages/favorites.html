<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المفضلة | نُخبة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">

<style>
body{background:#030608;color:#fff;font-family:Tajawal,sans-serif;margin:0}
a{text-decoration:none;color:inherit}
.fav-header{background:#05090c;border-bottom:1px solid #ffffff18;padding:16px 0}
.fav-nav{width:min(1200px,94%);margin:auto;display:flex;align-items:center;justify-content:space-between;gap:15px}
.fav-logo{font-size:34px;font-weight:900;line-height:1.1}
.fav-logo span{color:#d8a64b}
.fav-logo small{display:block;font-size:10px;letter-spacing:4px;color:#d8a64b;margin-top:5px}

.fav-page{width:min(1200px,94%);margin:auto;padding:34px 0 60px}
.fav-title{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-bottom:24px}
.fav-title h1{font-size:40px;margin:0}
.fav-title p{color:#aaa;margin:8px 0 0;line-height:1.7}

.fav-layout{display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start}
.fav-list{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}

.fav-card{
  background:linear-gradient(180deg,#151b20,#080b0e);
  border:1px solid #ffffff20;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 24px 70px #0009;
}
.fav-card img{
  width:100%;
  height:220px;
  object-fit:contain;
  background:radial-gradient(circle,#d8a64b22,#0b1014 60%);
  padding:18px;
}
.fav-content{padding:20px}
.fav-badge{display:inline-block;background:#d8a64b;color:#111;font-weight:900;border-radius:8px;padding:6px 12px;margin-bottom:12px}
.fav-card h3{font-size:22px;margin:0 0 10px}
.fav-card p{color:#aaa;line-height:1.7;margin:0 0 12px}
.fav-price{font-size:25px;font-weight:900;color:#f3d18a;margin:10px 0 16px}
.fav-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.fav-side{
  background:linear-gradient(180deg,#181f24,#090c0f);
  border:1px solid #d8a64b55;
  border-radius:24px;
  padding:24px;
  box-shadow:0 30px 90px #000;
}
.fav-side h2{margin:0 0 18px;font-size:28px}
.side-row{display:flex;justify-content:space-between;gap:15px;border-bottom:1px solid #ffffff14;padding:14px 0;color:#ddd}
.side-row b{color:#fff}

.empty{
  grid-column:1/-1;
  background:linear-gradient(180deg,#151b20,#080b0e);
  border:1px solid #ffffff20;
  border-radius:24px;
  padding:55px 25px;
  text-align:center;
  box-shadow:0 25px 70px #0008;
}
.empty h2{font-size:30px;margin:0 0 12px}
.empty p{color:#aaa;line-height:1.8;margin:0 0 22px}

footer{text-align:center;color:#aaa;padding:30px 0;border-top:1px solid #ffffff12}

@media(max-width:850px){
  .fav-layout{grid-template-columns:1fr}
  .fav-list{grid-template-columns:1fr}
  .fav-side{order:2}
}

@media(max-width:600px){
  .fav-nav{align-items:center}
  .fav-logo{font-size:28px}
  .fav-nav .btn{padding:11px 14px;font-size:13px}
  .fav-title{flex-direction:column;align-items:flex-start}
  .fav-title h1{font-size:34px}
  .fav-actions{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header class="fav-header">
  <div class="fav-nav">
    <div class="fav-logo">نُخ<span>بة</span><small>NUKHBA</small></div>
    <a href="../index.html" class="btn">العودة للمتجر</a>
  </div>
</header>

<main class="fav-page">

  <div class="fav-title">
    <div>
      <h1>المفضلة ❤️</h1>
      <p>منتجاتك المحفوظة تظهر هنا بصورها وتفاصيلها بشكل منظم.</p>
    </div>
    <a href="../index.html#products" class="btn secondary">تصفح المنتجات</a>
  </div>

  <div class="fav-layout">
    <section class="fav-list" id="favoritesBox"></section>

    <aside class="fav-side">
      <h2>ملخص المفضلة</h2>
      <div class="side-row"><span>عدد المنتجات</span><b id="favCount">0</b></div>
      <div class="side-row"><span>الحالة</span><b>محفوظة محليًا</b></div>
      <div class="side-row"><span>الخطوة التالية</span><b>أضف للسلة</b></div>
      <br>
      <button class="btn secondary" onclick="clearFavorites()" style="width:100%;">تفريغ المفضلة</button>
    </aside>
  </div>

</main>

<footer>© 2026 نُخبة — المنتجات المفضلة</footer>

<script>
let fav = JSON.parse(localStorage.getItem("nukhba_wishlist")) || [];
const box = document.getElementById("favoritesBox");
const count = document.getElementById("favCount");

const products = {
  "iPhone 15 Pro Max": {
    price:3899,
    priceText:"3,899 ريال",
    desc:"256GB · تيتانيوم طبيعي · بطارية 96%",
    image:"https://images.unsplash.com/photo-1695048133142-1a20484d2569?q=80&w=900"
  },
  "Samsung Galaxy S24 Ultra": {
    price:4399,
    priceText:"4,399 ريال",
    desc:"512GB · تيتانيوم رمادي · ضمان سنة",
    image:"https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?q=80&w=900"
  },
  "MacBook Air M2": {
    price:3299,
    priceText:"3,299 ريال",
    desc:"13 إنش · 8GB · 256GB · نظيف جدًا",
    image:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8?q=80&w=900"
  },
  "iPad Pro 11": {
    price:2299,
    priceText:"2,299 ريال",
    desc:"M2 · 256GB · خدوش بسيطة",
    image:"https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?q=80&w=900"
  },
  "Sony WH-1000XM5": {
    price:1299,
    priceText:"1,299 ريال",
    desc:"أسود · إلغاء ضوضاء · ضمان الوكيل",
    image:"https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?q=80&w=900"
  }
};

function renderFavorites(){
  count.innerText = fav.length;

  if(fav.length === 0){
    box.innerHTML = `
      <div class="empty">
        <h2>لا توجد منتجات محفوظة</h2>
        <p>اضغط على القلب ♡ في أي منتج ليظهر هنا بصورته وتفاصيله.</p>
        <a href="../index.html#products" class="btn">العودة للتسوق</a>
      </div>
    `;
    return;
  }

  box.innerHTML = fav.map((name,index)=>{
    const product = products[name] || {
      price:0,
      priceText:"غير محدد",
      desc:"منتج محفوظ في المفضلة",
      image:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=900"
    };

    return `
      <div class="fav-card">
        <img src="${product.image}" alt="${name}">
        <div class="fav-content">
          <span class="fav-badge">محفوظ</span>
          <h3>${name}</h3>
          <p>${product.desc}</p>
          <div class="fav-price">${product.priceText}</div>
          <div class="fav-actions">
            <button class="btn" onclick="addToCart('${name}')">أضف للسلة</button>
            <button class="btn secondary" onclick="removeFavorite(${index})">إزالة</button>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

function addToCart(name){
  const product = products[name];
  if(!product){
    alert("تعذر إضافة المنتج");
    return;
  }

  let cart = JSON.parse(localStorage.getItem("nukhba_cart")) || [];
  let found = cart.find(item => item.name === name);

  if(found){ found.qty += 1; }
  else{ cart.push({name:name,price:product.price,image:product.image,qty:1}); }

  localStorage.setItem("nukhba_cart", JSON.stringify(cart));
  alert("تمت إضافة المنتج إلى السلة ✅");
}

function removeFavorite(index){
  fav.splice(index,1);
  localStorage.setItem("nukhba_wishlist", JSON.stringify(fav));
  renderFavorites();
}

function clearFavorites(){
  localStorage.removeItem("nukhba_wishlist");
  fav = [];
  renderFavorites();
}

renderFavorites();
</script>

</body>
</html>
