<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المفضلة | نُخبة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<main class="container" style="padding:60px 0;">
<h1>المفضلة ❤️</h1>
<section class="products" id="favoritesBox"></section>
<a href="../index.html" class="btn">العودة للتسوق</a>
</main>

<script>
let fav = JSON.parse(localStorage.getItem("nukhba_wishlist")) || [];
const box = document.getElementById("favoritesBox");

if(fav.length === 0){
  box.innerHTML = `<div class="card"><h3>لا توجد منتجات محفوظة</h3><p class="meta">اضغط على القلب في أي منتج لإضافته هنا.</p></div>`;
}else{
  box.innerHTML = fav.map(name=>`
    <div class="card">
      <h3>${name}</h3>
      <p class="meta">منتج محفوظ في المفضلة</p>
    </div>
  `).join("");
}
</script>

</body>
</html>
