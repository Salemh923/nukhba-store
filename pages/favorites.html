<script>
const products = [
  {id:1,name:"iPhone 15 Pro Max",price:3899,image:"https://images.unsplash.com/photo-1695048133142-1a20484d2569?q=80&w=900",meta:"256GB · تيتانيوم طبيعي · بطارية 96%"},
  {id:2,name:"Samsung Galaxy S24 Ultra",price:4399,image:"https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?q=80&w=900",meta:"512GB · قلم S Pen · جديد"},
  {id:3,name:"MacBook Air M2",price:3299,image:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8?q=80&w=900",meta:"13 إنش · 8GB RAM · 256GB SSD"}
];

function getProductById(id){
  return products.find(p=>Number(p.id)===Number(id));
}

function formatPrice(num){
  return num.toLocaleString() + " ريال";
}

let wish = JSON.parse(localStorage.getItem("nukhba_wishlist")) || [];
const box = document.getElementById("favBox");

function render(){
  if(!wish.length){
    box.innerHTML = `<div class="empty"><h2>المفضلة فارغة</h2><p>لم تقم بحفظ أي منتج بعد.</p><br><a class="btn" href="../index.html">تصفح المتجر</a></div>`;
    return;
  }

  box.innerHTML = wish.map(id=>{
    const p = getProductById(id);
    if(!p) return "";
    return `
      <div class="card">
        <img src="${p.image}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p class="meta">${p.meta}</p>
        <div class="price">${formatPrice(p.price)}</div>
        <div class="actions">
          <button class="btn" onclick="addToCart(${p.id})">السلة</button>
          <button class="btn secondary" onclick="removeFav(${p.id})">حذف</button>
        </div>
      </div>
    `;
  }).join("");
}

function addToCart(id){
  const p = getProductById(id);
  let cart = JSON.parse(localStorage.getItem("nukhba_cart")) || [];
  let found = cart.find(item=>Number(item.id)===Number(id));
  if(found){found.qty += 1}else{cart.push({id:p.id,name:p.name,price:p.price,image:p.image,qty:1})}
  localStorage.setItem("nukhba_cart",JSON.stringify(cart));
  alert("تمت الإضافة للسلة");
}

function removeFav(id){
  wish = wish.filter(x=>Number(x)!==Number(id));
  localStorage.setItem("nukhba_wishlist",JSON.stringify(wish));
  render();
}

render();
</script>
