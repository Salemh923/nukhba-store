<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حسابي - نخبة</title>

<link rel="stylesheet" href="../css/style.css">

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
}

.header{
    background:#05080a;
    color:#d4a24c;
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
}

.container{
    max-width:500px;
    margin:20px auto;
    padding:15px;
}

.card{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.btn{
    display:block;
    width:100%;
    background:#d4a24c;
    color:white;
    border:none;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="header">
نُخبة
</div>

<div class="container">

<div class="card">
<h3>الملف الشخصي</h3>
<p>الاسم: مستخدم</p>
<p>البريد الإلكتروني: user@example.com</p>
</div>

<div class="card">
<h3>إعدادات الحساب</h3>
<button class="btn">تعديل البيانات</button>
<button class="btn">منتجاتي</button>
<button class="btn">تسجيل الخروج</button>
</div>

</div>

</body>
</html>
