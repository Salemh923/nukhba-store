<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السلة | نُخبة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">

<style>
body{margin:0;background:#030608;color:#fff;font-family:Tajawal,sans-serif}
a{text-decoration:none;color:inherit}

.cart-header-top{
  background:#05090c;
  border-bottom:1px solid #ffffff18;
  padding:14px 0;
}

.cart-nav{
  width:min(1200px,94%);
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:15px;
}

.cart-logo{font-size:34px;font-weight:900;line-height:1.1;color:#fff;white-space:nowrap}
.cart-logo span{color:#d8a64b}
.cart-logo small{display:block;font-size:10px;letter-spacing:4px;color:#d8a64b;margin-top:4px}

.cart-page{width:min(1200px,94%);margin:auto;padding:34px 0 70px}

.cart-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:18px;
  margin-bottom:34px;
  flex-wrap:wrap;
}

.cart-header h1{margin:0 0 8px;font-size:38px;line-height:1.25}
.cart-header .meta{margin:0;color:#aaa;line-height:1.7;font-size:15px}
.cart-header .btn{margin-top:4px}

.cart-layout{
  display:grid;
  grid-template-columns:minmax(0,1fr) 330px;
  gap:24px;
  align-items:start;
}

.cart-list{display:flex;flex-direction:column;gap:18px;min-width:0}

.cart-item{
  display:grid;
  grid-template-columns:140px minmax(0,1fr) auto;
  gap:18px;
  align-items:center;
  background:linear-gradient(180deg,#151b20,#080b0e);
  border:1px solid #ffffff20;
  border-radius:24px;
  padding:16px;
  box-shadow:0 24px 70px #0008;
}

.cart-item img{
  width:140px;
  height:115px;
  object-fit:contain;
  border-radius:16px;
  background:radial-gradient(circle,#d8a64b22,#0b1014 60%);
  padding:12px;
}

.cart-info{min-width:0}
.cart-info h3{margin:0 0 8px;font-size:21px;line-height:1.35}
.cart-info p{color:#aaa;margin:5px 0;line-height:1.6}
.cart-price{font-size:23px;font-weight:900;color:#f3d18a;margin-top:8px}

.remove-btn{
  background:#ffffff12;
  color:#fff;
  border:1px solid #ffffff25;
  border-radius:12px;
  padding:11px 16px;
  cursor:pointer;
  font-family:inherit;
  font-weight:800;
}

.summary{
  background:linear-gradient(180deg,#181f24,#090c0f);
  border:1px solid #d8a64b55;
  border-radius:24px;
  padding:24px;
  box-shadow:0 30px 90px #000;
  position:sticky;
  top:20px;
}

.summary h2{margin:0 0 18px;font-size:27px;line-height:1.3}
.summary-row{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid #ffffff14;padding:13px 0;color:#ddd}
.summary-total{font-size:28px;font-weight:900;color:#f3d18a;margin:22px 0}
.checkout-actions{display:grid;gap:12px}
.checkout-actions .btn{text-align:center;width:100%}

.empty{
  background:linear-gradient(180deg,#151b20,#080b0e);
  border:1px solid #ffffff20;
  border-radius:24px;
  padding:44px 22px;
  text-align:center;
  box-shadow:0 24px 70px #0008;
}

.empty h2{margin:0 0 12px;font-size:30px;line-height:1.35}
.empty p{margin:0 0 22px;color:#aaa;line-height:1.8}

footer{text-align:center;color:#aaa;padding:30px 0;border-top:1px solid #ffffff12}

@media(max-width:900px){
  .cart-layout{grid-template-columns:1fr}
  .summary{position:static;order:2}
}

@media(max-width:600px){
  .cart-nav{align-items:center}
  .cart-logo{font-size:28px}
  .cart-logo small{font-size:9px;letter-spacing:3px}
  .cart-nav .btn{padding:11px 14px;font-size:13px}

  .cart-page{padding-top:26px}
  .cart-header{flex-direction:column;gap:14px;margin-bottom:24px}
  .cart-header h1{font-size:31px}
  .cart-header .btn{width:auto;min-width:150px}

  .cart-layout{gap:22px}
  .cart-item{grid-template-columns:1fr;text-align:center;padding:18px}
  .cart-item img{width:100%;height:210px}
  .remove-btn{width:100%}

  .summary{padding:22px 18px}
  .empty{padding:34px 18px}
}
</style>
</head>

<body>

<header class="cart-header-top">
  <div class="cart-nav">
    <div class="cart-logo">نُخ<span>بة</span><small>NUKHBA</small></div>
    <a class="btn" href="../index.html">العودة للمتجر</a>
  </div>
</header>

<main class="cart-page">

  <div class="cart-header">
    <div>
      <h1>سلة المشتريات</h1>
      <p class="meta">راجع منتجاتك قبل إتمام الطلب، وتأكد من الكمية والسعر النهائي.</p>
    </div>
    <a href="../index.html" class="btn secondary">متابعة التسوق</a>
  </div>

  <div class="cart-layout">
    <section class="cart-list" id="cartItems"></section>

    <aside class="summary">
      <h2>ملخص الطلب</h2>

      <div class="summary-row">
        <span>عدد المنتجات</span>
        <b id="cartCount">0</b>
      </div>

      <div class="summary-row">
        <span>الشحن</span>
        <b>مجاني</b>
      </div>

      <div class="summary-row">
        <span>الحالة</span>
        <b>جاهز للدفع</b>
      </div>

      <div class="summary-total" id="cartTotal">0 ريال</div>

      <div class="checkout-actions">
        <button class="btn" onclick="checkout()">إتمام الطلب</button>
        <button class="btn secondary" onclick="clearCart()">تفريغ السلة</button>
      </div>
    </aside>
  </div>

</main>

<footer>© 2026 نُخبة — سلة المشتريات</footer>

<script>
let cart = JSON.parse(localStorage.getItem("nukhba_cart")) || [];

function renderCart(){
  const box = document.getElementById("cartItems");
  const countBox = document.getElementById("cartCount");
  const totalBox = document.getElementById("cartTotal");

  if(cart.length === 0){
    box.innerHTML = `
      <div class="empty">
        <h2>السلة فارغة</h2>
        <p>لم تقم بإضافة أي منتج بعد. ابدأ التسوق وأضف منتجاتك هنا.</p>
        <a href="../index.html" class="btn">العودة للتسوق</a>
      </div>
    `;
    countBox.innerText = "0";
    totalBox.innerText = "0 ريال";
    return;
  }

  let total = 0;
  let count = 0;

  box.innerHTML = cart.map((item,index)=>{
    total += item.price * item.qty;
    count += item.qty;

    return `
      <div class="cart-item">
        <img src="${item.image}" alt="${item.name}">
        <div class="cart-info">
          <h3>${item.name}</h3>
          <p>الكمية: ${item.qty}</p>
          <p>منتج محفوظ في سلة نُخبة</p>
          <div class="cart-price">${(item.price * item.qty).toLocaleString()} ريال</div>
        </div>
        <button class="remove-btn" onclick="removeItem(${index})">حذف</button>
      </div>
    `;
  }).join("");

  countBox.innerText = count;
  totalBox.innerText = total.toLocaleString() + " ريال";
}

function removeItem(index){
  cart.splice(index,1);
  localStorage.setItem("nukhba_cart", JSON.stringify(cart));
  renderCart();
}

function clearCart(){
  localStorage.removeItem("nukhba_cart");
  cart = [];
  renderCart();
}

function checkout(){
  if(cart.length === 0){
    alert("السلة فارغة");
    return;
  }
  window.location.href = "checkout.html";
}

renderCart();
</script>

</body>
</html>
