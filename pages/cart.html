<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>السلة</title>
</head>

<body>

<h1>سلة المشتريات</h1>

<div id="cartItems"></div>

<script>

const cart =
JSON.parse(
localStorage.getItem("cart")
)||[];

document.getElementById("cartItems")
.innerHTML =
cart.map(item=>`

<div>

<h3>${item.title}</h3>

<p>${item.price} ريال</p>

</div>

`).join("");

</script>

</body>
</html>
