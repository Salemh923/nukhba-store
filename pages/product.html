<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل المنتج | نُخبة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
body{background:#030608;color:#fff;font-family:Tajawal,sans-serif;margin:0;padding:0}
.container{max-width:1200px;margin:50px auto;padding:0 15px;display:grid;grid-template-columns:1fr 1fr;gap:40px}
.product-images{border-radius:22px;overflow:hidden;background:#111;padding:20px;display:flex;flex-direction:column;gap:12px}
.product-images img{width:100%;border-radius:16px;transition:.4s;cursor:pointer}
.product-main{border-radius:22px;background:#111;padding:35px;border:1px solid #333;display:flex;flex-direction:column;gap:18px}
.product-main h1{margin:0;font-size:36px;color:var(--gold2)}
.product-main .meta{color:#aaa;font-size:15px}
.product-main .price{color:var(--gold2);font-size:28px;font-weight:900}
.product-main button,.product-main a{width:100%;padding:14px;font-weight:900;border-radius:12px;border:none;cursor:pointer;text-align:center;transition:.3s}
.product-main button{background:linear-gradient(135deg,var(--gold2),#ad762d);color:#111;margin-top:10px}
.product-main button:hover{transform:translateY(-3px)}
.product-main a{background:#ffffff12;color:#fff;border:1px solid #ffffff25;margin-top:10px}
.product-main a:hover{transform:translateY(-2px)}
.specs{background:#0b1115;padding:18px;border-radius:16px}
.specs ul{list-style:none;padding:0;margin:0;color:#ddd}
.specs li{padding:6px 0;border-bottom:1px solid #333}
.comments{margin-top:20px}
.comments textarea{width:100%;padding:12px;border-radius:12px;background:#0b1115;color:#fff;border:1px solid #444;font-family:inherit;resize:none}
.comments button{margin-top:10px;background:linear-gradient(135deg,var(--gold2),#ad762d);color:#111;padding:12px;border-radius:12px;border:none;cursor:pointer}
.comments .comment-box{margin-top:12px;background:#111;border:1px solid #333;padding:12px;border-radius:12px;color:#ddd;line-height:1.6}

@media(max-width:900px){.container{grid-template-columns:1fr;gap:20px;margin:30px auto}}
</style>
</head>
<body>

<div class="container">
  <div class="product-images">
    <img id="mainImage" src="https://images.unsplash.com/photo-1695048133142-1a20484d2569?q=80&w=900">
    <div style="display:flex;gap:10px">
      <img src="https://images.unsplash.com/photo-1695048133142-1a20484d2569?q=80&w=900" onclick="changeImage(this.src)">
      <img src="https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?q=80&w=900" onclick="changeImage(this.src)">
      <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?q=80&w=900" onclick="changeImage(this.src)">
    </div>
  </div>

  <div class="product-main">
    <h1>iPhone 15 Pro Max</h1>
    <p class="meta">256GB · تيتانيوم طبيعي · بطارية 96% · مفحوص ومضمون</p>
    <h2 class="price">3,899 ريال</h2>
    <button onclick="addToCart()">إضافة للسلة</button>
    <a href="cart.html">الذهاب للسلة</a>
    <a href="../index.html">العودة للمتجر</a>

    <div class="specs">
      <h3>مواصفات المنتج:</h3>
      <ul>
        <li>السعة: 256GB</li>
        <li>الحالة: شبه جديد</li>
        <li>البطارية: 96%</li>
        <li>الضمان: 30 يوم فحص</li>
      </ul>
    </div>

    <div class="comments">
      <h3>تعليقات العملاء:</h3>
      <textarea id="commentText" rows="4" placeholder="اكتب تعليقك أو استفسارك هنا..."></textarea>
      <button onclick="saveComment()">حفظ التعليق</button>
      <div id="commentsBox"></div>
    </div>
  </div>
</div>

<script>
function changeImage(src){document.getElementById('mainImage').src=src}

function addToCart(){
  let cart=JSON.parse(localStorage.getItem("nukhba_cart"))||[];
  cart.push({
    name:"iPhone 15 Pro Max",
    price:3899,
    image:"https://images.unsplash.com/photo-1695048133142-1a20484d2569?q=80&w=900",
    qty:1
  });
  localStorage.setItem("nukhba_cart",JSON.stringify(cart));
  alert("تمت إضافة المنتج للسلة ✅");
}

function saveComment(){
  let text=document.getElementById("commentText").value.trim();
  if(!text){alert("اكتب تعليقك أولاً");return;}
  let comments=JSON.parse(localStorage.getItem("product_comments"))||[];
  comments.push(text);
  localStorage.setItem("product_comments",JSON.stringify(comments));
  document.getElementById("commentText").value="";
  loadComments();
}

function loadComments(){
  let comments=JSON.parse(localStorage.getItem("product_comments"))||[];
  let box=document.getElementById("commentsBox");
  box.innerHTML=comments.length?comments.map(c=>`<div class="comment-box">${c}</div>`).join(''):'<p style="color:#aaa">لا توجد تعليقات بعد.</p>';
}

loadComments();
</script>
</body>
</html>
