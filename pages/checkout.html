<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدفع | نُخبة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/responsive.css">
<link rel="stylesheet" href="../css/animations.css">
</head>
<body>

<header class="luxury-header">
  <div class="header-inner container">
    <a class="logo" href="../index.html">نُخ<span>بة</span><small>NUKHBA</small></a>
  </div>
</header>

<main class="container">
  <div class="section-head">
    <h2>إتمام الدفع</h2>
    <a href="../index.html">الرئيسية ‹</a>
  </div>

  <section class="page-grid">
    <form class="checkout-form">
      <label>الاسم الكامل</label>
      <input type="text" placeholder="أدخل الاسم الكامل" required>

      <label>البريد الإلكتروني</label>
      <input type="email" placeholder="example@mail.com" required>

      <label>رقم الهاتف</label>
      <input type="tel" placeholder="05XXXXXXXX" required>

      <label>العنوان</label>
      <textarea placeholder="عنوان الشحن" required></textarea>

      <label>طريقة الدفع</label>
      <select required>
        <option value="">اختر الطريقة</option>
        <option value="credit">بطاقة ائتمان</option>
        <option value="paypal">PayPal</option>
        <option value="cash">الدفع عند الاستلام</option>
      </select>

      <button class="btn" type="submit">إتمام الطلب</button>
    </form>
  </section>
</main>

<footer class="footer">
  <div class="footer-bottom">© 2026 نُخبة — جميع الحقوق محفوظة</div>
</footer>

<script src="../js/products.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/cart.js"></script>
</body>
</html>
