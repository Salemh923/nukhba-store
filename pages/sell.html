<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بيع منتج | نُخبة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/responsive.css">
<link rel="stylesheet" href="../css/animations.css">
</head>
<body>

<header class="luxury-header">
  <div class="header-inner container">
    <a class="logo" href="../index.html">نُخ<span>بة</span><small>NUKHBA</small></a>
  </div>
</header>

<main class="container">
  <div class="section-head">
    <h2>بيع منتجك</h2>
    <a href="../index.html">الرئيسية ‹</a>
  </div>

  <section class="page-grid">
    <form class="sell-form">
      <label>اسم المنتج</label>
      <input type="text" placeholder="أدخل اسم المنتج" required>

      <label>الفئة</label>
      <select required>
        <option value="">اختر الفئة</option>
        <option value="electronics">إلكترونيات</option>
        <option value="cars">سيارات</option>
        <option value="watches">ساعات</option>
        <option value="realestate">عقارات</option>
        <option value="fashion">أزياء</option>
        <option value="home">منزل ومطبخ</option>
      </select>

      <label>الحالة</label>
      <select required>
        <option value="">اختر الحالة</option>
        <option value="جديد">جديد</option>
        <option value="شبه جديد">شبه جديد</option>
        <option value="مستعمل">مستعمل</option>
      </select>

      <label>السعر</label>
      <input type="number" placeholder="أدخل السعر" required>

      <label>رفع صورة المنتج</label>
      <input type="file" accept="image/*" required>

      <button class="btn" type="submit">نشر المنتج</button>
    </form>
  </section>
</main>

<footer class="footer">
  <div class="footer-bottom">© 2026 نُخبة — جميع الحقوق محفوظة</div>
</footer>

<script src="../js/products.js"></script>
<script src="../js/storage.js"></script>
</body>
</html>
