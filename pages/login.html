<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | نُخبة</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">

<style>
.login-box{
max-width:500px;
margin:80px auto;
background:#111;
padding:40px;
border-radius:20px;
border:1px solid #333;
}

.login-box h1{
text-align:center;
margin-bottom:30px;
}

.login-box input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#1c1c1c;
color:#fff;
}

.login-box button{
width:100%;
}

.login-links{
margin-top:20px;
text-align:center;
}

.login-links a{
color:#d8a64b;
text-decoration:none;
}
</style>

</head>

<body>

<div class="login-box">

<h1>تسجيل الدخول</h1>

<input type="email" placeholder="البريد الإلكتروني">

<input type="password" placeholder="كلمة المرور">

<button class="btn">
دخول
</button>

<div class="login-links">
<p>
ليس لديك حساب؟
<a href="account.html">إنشاء حساب</a>
</p>
</div>

</div>

</body>
</html>
